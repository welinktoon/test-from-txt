(--border);border-radius:8px;background:#fbfcff;color:var(--text);font:inherit}body.dark textarea,body.dark input[type=number],body.dark input[type=search],body.dark .settings,body.dark .recent-files,body.dark .review-answer{background:#111722}textarea{min-height:190px;resize:vertical;padding:12px;font:14px/1.45 Consolas,'Courier New',monospace}input[type=number],input[type=search]{min-height:42px;padding:8px 10px}button{min-height:44px;border:0;border-radius:8px;padding:10px 16px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer;transition:background .15s,transform .15s}button:hover{background:var(--primary2)}button:active{transform:translateY(1px)}button.secondary{background:#eef2ff;color:#1e3a8a}body.dark button.secondary{background:#23314a;color:#dce8ff}button:disabled{cursor:not-allowed;opacity:.55;transform:none}.settings{grid-template-columns:repeat(2,minmax(0,1fr));padding:14px;border:1px solid var(--border);border-radius:8px;background:#fbfcff}.field{display:grid;gap:6px}.checks{grid-column:1/-1}.check{display:inline-flex;align-items:center;gap:8px;font-weight:700}.check input{width:18px;height:18px;accent-color:var(--primary)}.badge{display:inline-flex;align-items:center;min-height:30px;padding:4px 10px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--muted);font-size:14px}body.dark .badge,body.dark .answer,body.dark .recent-file,body.dark .review-question{background:#171d28}.recent-files{display:none;gap:10px;padding:14px;border:1px solid var(--border);border-radius:8px;background:#fbfcff}.recent-files.visible{display:grid}.recent-title{margin:0;color:var(--muted);font-size:14px;font-weight:700}.recent-list{display:flex;flex-wrap:wrap;gap:8px}.recent-file{display:inline-flex;max-width:100%;min-height:38px;border:1px solid var(--border);border-radius:8px;padding:7px 10px;background:#fff;color:var(--text);font-weight:700}.recent-file span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.error{display </main>
<script>
const $=id=>document.getElementById(id),fileInput=$('fileInput'),openFileBtn=$('openFileBtn'),textInput=$('textInput'),startBtn=$('startBtn'),reviewBtn=$('reviewBtn'),loadSample=$('loadSample'),themeToggle=$('themeToggle'),questionCount=$('questionCount'),selectedCount=$('selectedCount'),rangeFrom=$('rangeFrom'),rangeTo=$('rangeTo'),shuffleQuestions=$('shuffleQuestions'),shuffleAnswers=$('shuffleAnswers'),errorBox=$('errorBox'),setup=$('setup'),quiz=$('quiz'),review=$('review'),result=$('result'),stepText=$('stepText'),scoreText=$('scoreText'),timerText=$('timerText'),statusBar=$('statusBar'),questionText=$('questionText'),answers=$('answers'),feedback=$('feedback'),prevBtn=$('prevBtn'),nextBtn=$('nextBtn'),backToSetup=$('backToSetup'),backFromReview=$('backFromReview'),finalScore=$('finalScore'),finalText=$('finalText'),restartBtn=$('restartBtn'),reviewSearch=$('reviewSearch'),reviewList=$('reviewList'),reviewCount=$('reviewCount'),searchCount=$('searchCount'),recentFiles=$('recentFiles'),recentList=$('recentList');
let questions=[],currentIndex=0,correctCount=0,answered=false,selectedAnswers=new Set(),reviewQuestions=[],recentFileItems=[],answerResults=[],selectedAnswerHistory=[],timerStartedAt=0,elapsedMs=0,timerId=null;
const sampleText=`? Столица Франции
+ Париж
- Берлин
- Мадрид
- Рим

? Какой знак отмечает правильный ответ в этом формате
+ плюс
- вопросительный знак
- минус

? Сколько будет 2 + 2
+ 4

- 5`;
function applyTheme(dark){document.body.classList.toggle('dark',dark);themeToggle.checked=dark;localStorage.setItem('txtTestTheme',dark?'dark':'light')}function setSample(show){loadSample.hidden=!show}function showSetup(){stopTimer();setup.style.display='grid';quiz.style.display='none';review.style.display='none';result.style.display='none';setSample(true)}
function parseQuestions(text){const parsed=[];let current=null;text.split(/\r?\n/).forEach((raw,index)=>{const line=raw.trim();if(!line)return;const marker=line[0],content=line.slice(1).trim();if(marker==='?'){if(current)parsed.push(current);current={text:content||`Вопрос ${parsed.length+1}`,answers:[],line:index+1};return}if((marker==='+'||marker==='-')&&current&&content)current.answers.push({text:content,correct:marker==='+'})});if(current)parsed.push(current);return parsed}function validateQuestions(items){if(!items.length)return'Не нашел вопросов. Каждый вопрос должен начинаться с символа ?.';for(const [i,item]of items.entries()){if(item.answers.length<2)return`В вопросе ${i+1} должно быть минимум два ответа.`;if(!item.answers.some(a=>a.correct))return`В вопросе ${i+1} нет правильного ответа со знаком +.`}return''}const shuffle=items=>[...items].sort(()=>Math.random()-.5);function setError(msg){errorBox.textContent=msg;errorBox.style.display=msg?'block':'none'}function fmt(ms){const s=Math.floor(ms/1000);return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}function updateTimer(){if(timerStartedAt){elapsedMs=Date.now()-timerStartedAt;timerText.textContent=fmt(elapsedMs)}}function startTimer(){stopTimer();elapsedMs=0;timerStartedAt=Date.now();timerText.textContent='00:00';timerId=setInterval(updateTimer,1000)}function stopTimer(){if(timerId)clearInterval(timerId);timerId=null;if(timerStartedAt)elapsedMs=Date.now()-timerStartedAt;timerStartedAt=0;timerText.textContent=fmt(elapsedMs)}function renderStatusBar(){statusBar.innerHTML='';statusBar.style.setProperty('--total',String(Math.max(questions.length,1)));questions.forEach((_,i)=>{const s=document.createElement('span');s.className='status-step';if(i===currentIndex)s.classList.add('current');if(answerResults[i]===true)s.classList.add('correct');if(answerResults[i]===false)s.classList.add('wrong');s.title=`Вопрос ${i+1}`;statusBar.appendChild(s)})}
function getRecentCookie(){const item=document.cookie.split('; ').find(r=>r.startsWith('txtTestRecentFiles='));if(!item)return[];try{return JSON.parse(decodeURIComponent(item.split('=').slice(1).join('=')))}catch{return[]}}function setRecentCookie(items){document.cookie=`txtTestRecentFiles=${encodeURIComponent(JSON.stringify(items.slice(0,6)))}; max-age=31536000; path=/; SameSite=Lax`}function makeFileId(){return crypto.randomUUID?crypto.randomUUID():`file-${Date.now()}-${Math.random().toString(16).slice(2)}`}function openHandleDb(){return new Promise((res,rej)=>{const r=indexedDB.open('txtTestFileHandles',1);r.onupgradeneeded=()=>r.result.createObjectStore('handles');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}async function saveFileHandle(id,handle){const db=await openHandleDb();return new Promise((res,rej)=>{const t=db.transaction('handles','readwrite');t.objectStore('handles').put(handle,id);t.oncomplete=res;t.onerror=()=>rej(t.error)})}async function getFileHandle(id){const db=await openHandleDb();return new Promise((res,rej)=>{const t=db.transaction('handles','readonly'),r=t.objectStore('handles').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}function rememberRecentFile(file,opt={}){const old=recentFileItems.find(x=>opt.id?x.id===opt.id:x.name===file.name&&x.size===file.size),item={id:opt.id||old?.id||makeFileId(),name:file.name,size:file.size,lastModified:file.lastModified,hasHandle:Boolean(opt.hasHandle||old?.hasHandle),usedAt:Date.now()};recentFileItems=[item,...recentFileItems.filter(x=>x.id!==item.id&&x.name!==item.name)].slice(0,6);setRecentCookie(recentFileItems);renderRecentFiles();return item}async function loadFileText(file,opt={}){textInput.value=await file.text();rememberRecentFile(file,opt);refreshCount();setError('')}function renderRecentFiles(){recentList.innerHTML='';recentFiles.classList.toggle('visible',recentFileItems.length>0);recentFileItems.forEach(item=>{const b=document.createElement('button');b.type='button';b.className='recent-file';b.title=item.hasHandle?'Открыть этот файл':'Файл нужно выбрать заново';const s=document.createElement('span');s.textContent=item.name;b.appendChild(s);b.onclick=()=>loadRecentFile(item);recentList.appendChild(b)})}async function loadRecentFile(item){if(!item.hasHandle){setError('Этот файл был выбран обычной кнопкой браузера. Для автоподгрузки откройте его один раз через кнопку «Открыть TXT».');return}try{const h=await getFileHandle(item.id);if(!h){setError('Браузер больше не хранит доступ к этому файлу. Откройте его заново через «Открыть TXT».');return}let p=await h.queryPermission({mode:'read'});if(p!=='granted')p=await h.requestPermission({mode:'read'});if(p!=='granted'){setError('Нет разрешения на чтение этого файла.');return}await loadFileText(await h.getFile(),{id:item.id,hasHandle:true})}catch{setError('Не получилось открыть последний файл. Выберите его заново.')}}async function openTxtFile(){if(!window.showOpenFilePicker){fileInput.click();setError('Если браузер не поддерживает быстрые последние файлы, файл нужно выбирать обычной кнопкой.');return}try{const[h]=await showOpenFilePicker({multiple:false,types:[{description:'TXT-файлы',accept:{'text/plain':['.txt']}}]});const file=await h.getFile(),id=makeFileId();await saveFileHandle(id,h);await loadFileText(file,{id,hasHandle:true})}catch(e){if(e.name!=='AbortError')setError('Не получилось открыть файл.')}}
function getRange(total){const from=Math.max(1,parseInt(rangeFrom.value,10)||1),raw=parseInt(rangeTo.value,10),to=Number.isFinite(raw)?raw:total;return{from,to:Math.min(total,Math.max(from,to))}}function getSelectedQuestions(items){const r=getRange(items.length);return items.slice(r.from-1,r.to)}function prepareSelectedQuestions(){const parsed=parseQuestions(textInput.value),err=validateQuestions(parsed);if(err){setError(err);return null}const selected=getSelectedQuestions(parsed);if(!selected.length){setError('В выбранном диапазоне нет вопросов.');return null}return selected}function syncRangeControls(total){rangeFrom.max=String(Math.max(total,1));rangeTo.max=String(Math.max(total,1));rangeTo.placeholder=total?`до ${total}`:'до конца';if(+rangeFrom.value<1)rangeFrom.value='1';if(total&&+rangeFrom.value>total)rangeFrom.value=String(total);if(rangeTo.value&&+rangeTo.value>total)rangeTo.value=String(total)}function refreshCount(){const parsed=parseQuestions(textInput.value);syncRangeControls(parsed.length);questionCount.textContent=`Вопросов: ${parsed.length}`;selectedCount.textContent=`Выбрано: ${getSelectedQuestions(parsed).length}`;setError('')}function startQuiz(){const selected=prepareSelectedQuestions();if(!selected)return;questions=selected.map(q=>({...q,answers:shuffleAnswers.checked?shuffle(q.answers):[...q.answers]}));if(shuffleQuestions.checked)questions=shuffle(questions);currentIndex=0;correctCount=0;answerResults=Array(questions.length).fill(null);selectedAnswerHistory=Array(questions.length).fill(null);setup.style.display='none';result.style.display='none';review.style.display='none';quiz.style.display='grid';setSample(false);startTimer();renderQuestion()}function showReview(){const selected=prepareSelectedQuestions();if(!selected)return;reviewQuestions=selected;reviewSearch.value='';setup.style.display='none';quiz.style.display='none';result.style.display='none';review.style.display='grid';setSample(false);renderReview()}function esc(v){return v.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function re(v){return v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}function hi(v,q){if(!q)return esc(v);return v.split(new RegExp(`(${re(q)})`,'gi')).map(p=>p.toLowerCase()===q.toLowerCase()?`<mark>${esc(p)}</mark>`:esc(p)).join('')}function renderReview(){const q=reviewSearch.value.trim(),low=q.toLowerCase();let count=0;reviewList.innerHTML='';reviewQuestions.forEach((question,i)=>{const hay=[question.text,...question.answers.map(a=>a.text)].join(' ').toLowerCase();if(low&&!hay.includes(low))return;count++;const a=document.createElement('article');a.className='review-question';a.innerHTML=`<p class='review-title'>${i+1}. ${hi(question.text,q)}</p><ul class='review-answers'>${question.answers.map(x=>`<li class='review-answer${x.correct?' correct':''}'>${x.correct?'+':'-'} ${hi(x.text,q)}</li>`).join('')}</ul>`;reviewList.appendChild(a)});reviewCount.textContent=`Вопросов: ${reviewQuestions.length}`;searchCount.textContent=q?`Найдено: ${count}`:`Найдено: ${reviewQuestions.length}`}
function renderQuestion(){const q=questions[currentIndex],saved=answerResults[currentIndex];answered=saved!==null;selectedAnswers=new Set(selectedAnswerHistory[currentIndex]||[]);prevBtn.disabled=currentIndex===0;nextBtn.disabled=!answered&&selectedAnswers.size===0;nextBtn.textContent=answered?(currentIndex===questions.length-1?'Показать результат':'Следующий вопрос'):'Проверить';feedback.textContent='';feedback.className='feedback';answers.innerHTML='';stepText.textContent=`Вопрос ${currentIndex+1} из ${questions.length}`;scoreText.textContent=`Верно: ${correctCount}`;renderStatusBar();questionText.textContent=q.text;q.answers.forEach((a,i)=>{const li=document.createElement('li'),b=document.createElement('button');b.type='button';b.className='answer';b.dataset.index=String(i);b.innerHTML=`<span class='mark'>${i+1}</span><span></span>`;b.querySelector('span:last-child').textContent=a.text;if(selectedAnswers.has(i))b.classList.add('selected');if(answered)b.disabled=true;b.onclick=()=>toggleAnswer(b,i);li.appendChild(b);answers.appendChild(li)});if(answered){feedback.textContent=saved?'Верно':'Неверно';feedback.classList.add(saved?'good':'bad');highlightCheckedAnswers()}}function toggleAnswer(b,i){if(answered)return;if(selectedAnswers.has(i)){selectedAnswers.delete(i);b.classList.remove('selected')}else{selectedAnswers.add(i);b.classList.add('selected')}selectedAnswerHistory[currentIndex]=[...selectedAnswers];nextBtn.disabled=selectedAnswers.size===0}function checkAnswers(){if(answered||selectedAnswers.size===0)return;answered=true;document.querySelectorAll('.answer').forEach(b=>b.disabled=true);const q=questions[currentIndex],ok=q.answers.every((a,i)=>a.correct===selectedAnswers.has(i));if(ok){correctCount++;feedback.textContent='Верно';feedback.classList.add('good')}else{feedback.textContent='Неверно';feedback.classList.add('bad')}answerResults[currentIndex]=ok;selectedAnswerHistory[currentIndex]=[...selectedAnswers];highlightCheckedAnswers();scoreText.textContent=`Верно: ${correctCount}`;nextBtn.disabled=false;nextBtn.textContent=currentIndex===questions.length-1?'Показать результат':'Следующий вопрос';renderStatusBar()}function highlightCheckedAnswers(){const q=questions[currentIndex];document.querySelectorAll('.answer').forEach((b,i)=>{b.classList.remove('selected');if(q.answers[i].correct)b.classList.add('correct');else if(selectedAnswers.has(i))b.classList.add('wrong')})}function nextQuestion(){if(!answered){checkAnswers();return}currentIndex++;if(currentIndex>=questions.length)showResult();else renderQuestion()}function previousQuestion(){if(currentIndex===0)return;currentIndex--;renderQuestion()}function showResult(){stopTimer();quiz.style.display='none';result.style.display='block';setSample(false);const pct=Math.round(correctCount/questions.length*100);finalScore.textContent=`${correctCount} / ${questions.length}`;finalText.textContent=`Результат: ${pct}%. Время: ${fmt(elapsedMs)}`}
