<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тест из TXT</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #20232a;
      --muted: #677083;
      --border: #d9deea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --good: #14804a;
      --bad: #c7352b;
      --soft-good: #e9f8ef;
      --soft-bad: #fdecea;
      --focus: #f7c948;
    }

    body.dark {
      color-scheme: dark;
      --bg: #10141c;
      --panel: #171d28;
      --text: #edf2ff;
      --muted: #a8b3c7;
      --border: #2c3548;
      --primary: #6ea8ff;
      --primary-dark: #8ab8ff;
      --good: #9ce6b7;
      --bad: #ff9d97;
      --soft-good: #163a26;
      --soft-bad: #421e22;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(246,247,251,.98)),
        radial-gradient(circle at top left, rgba(37,99,235,.16), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: Arial, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    body.dark {
      background:
        linear-gradient(180deg, rgba(16,20,28,.82), rgba(16,20,28,.98)),
        radial-gradient(circle at top left, rgba(110,168,255,.14), transparent 38%),
        var(--bg);
    }

    .shell {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: 0;
    }

    .hint {
      max-width: 620px;
      margin: 8px 0 0;
      color: var(--muted);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 14px 40px rgba(31, 41, 55, .08);
    }

    body.dark .panel {
      box-shadow: 0 18px 44px rgba(0, 0, 0, .28);
    }

    .uploader {
      display: grid;
      gap: 18px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .file-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .file-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px dashed #9aa6bb;
      border-radius: 8px;
      background: #fbfcff;
    }

    .hidden-file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    body.dark input[type="file"],
    body.dark input[type="number"],
    body.dark textarea,
    body.dark .search-row input,
    body.dark .settings,
    body.dark .recent-files,
    body.dark .review-answer {
      background: #111722;
    }

    input[type="number"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fbfcff;
      color: var(--text);
      font: inherit;
    }

    label {
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 190px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font: 14px/1.45 Consolas, "Courier New", monospace;
      color: var(--text);
      background: #fbfcff;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }

    body.dark button.secondary {
      background: #23314a;
      color: #dce8ff;
    }

    button.secondary:hover {
      background: #dfe7ff;
    }

    body.dark button.secondary:hover {
      background: #2d3d5a;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcff;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .checks {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 700;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
    }

    .recent-files {
      display: none;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcff;
    }

    .recent-files.visible {
      display: grid;
    }

    .recent-title {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .recent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recent-file {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
    }

    .recent-file:hover {
      border-color: #9bb7ff;
      background: #f8faff;
    }

    body.dark .recent-file:hover {
      background: #202a3c;
    }

    .recent-file span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.dark .badge,
    body.dark .answer,
    body.dark .recent-file,
    body.dark .review-question {
      background: #171d28;
    }

    .error {
      display: none;
      padding: 12px 14px;
      border: 1px solid #f2b8b5;
      border-radius: 8px;
      color: #8d1f16;
      background: var(--soft-bad);
    }

    .quiz {
      display: none;
      padding: 22px;
    }

    .review {
      display: none;
      padding: 22px;
    }

    .progress {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7ebf3;
      margin-bottom: 20px;
    }

    body.dark .bar {
      background: #263145;
    }

    .bar span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--primary);
      transition: width .2s ease;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.25;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin: 0 0 18px;
      padding: 0;
      list-style: none;
    }

    .answer {
      width: 100%;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      text-align: left;
      font-weight: 600;
    }

    .answer:hover {
      background: #f8faff;
      border-color: #9bb7ff;
    }

    body.dark .answer:hover {
      background: #202a3c;
      border-color: #6ea8ff;
    }

    .answer.selected {
      border-color: var(--primary);
      background: #eef5ff;
      color: #17439b;
    }

    body.dark .answer.selected {
      background: #1d3558;
      color: #e8f1ff;
    }

    .answer.correct {
      border-color: #7ac99f;
      background: var(--soft-good);
      color: #0b5f36;
    }

    body.dark .answer.correct {
      color: #c7f8d7;
    }

    .answer.wrong {
      border-color: #f1a5a0;
      background: var(--soft-bad);
      color: #8d1f16;
    }

    body.dark .answer.wrong {
      color: #ffd2cf;
    }

    .answer .mark {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #eef2f7;
      color: #42526b;
      font-size: 13px;
      font-weight: 800;
    }

    body.dark .answer .mark {
      background: #263145;
      color: #c4cce0;
    }

    .feedback {
      min-height: 28px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .feedback.good {
      color: var(--good);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .result {
      display: none;
      padding: 26px;
      text-align: center;
    }

    .review-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .search-row {
      display: grid;
      gap: 6px;
    }

    .search-row input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fbfcff;
      color: var(--text);
      font: inherit;
    }

    .review-list {
      display: grid;
      gap: 12px;
    }

    .review-question {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .review-question.hidden {
      display: none;
    }

    .review-title {
      margin: 0 0 10px;
      font-weight: 800;
    }

    .review-answers {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .review-answer {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcff;
    }

    .review-answer.correct {
      border-color: #a7d46f;
      background: #e8f8cf;
      color: #315c05;
      font-weight: 700;
    }

    body.dark .review-answer.correct {
      border-color: #86c75f;
      background: #26461e;
      color: #d9ffc3;
    }

    mark {
      border-radius: 4px;
      padding: 0 2px;
      background: #fff1a8;
      color: inherit;
    }

    body.dark mark {
      background: #775f00;
      color: #fff5bc;
    }

    .score {
      margin: 8px 0 18px;
      font-size: clamp(34px, 7vw, 70px);
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .sample {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      header,
      .file-row,
      .file-tools,
      .settings,
      .review-head,
      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .shell {
        width: min(100% - 20px, 980px);
        padding-top: 16px;
      }

      .uploader,
      .quiz,
      .review,
      .result {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Тест из TXT</h1>
      </div>
      <div class="actions">
        <label class="check">
          <input id="themeToggle" type="checkbox">
          Темная тема
        </label>
        <button class="secondary" id="loadSample" type="button">Пример</button>
      </div>
    </header>

    <section class="panel uploader" id="setup">
      <div class="file-row">
        <div class="file-tools">
          <input class="hidden-file-input" id="fileInput" type="file" accept=".txt,text/plain">
          <button class="secondary" id="chooseFileBtn" type="button">Выбрать файл</button>
          <button class="secondary" id="openFileBtn" type="button">Открыть TXT</button>
        </div>
        <div class="actions">
          <button id="startBtn" type="button">Начать тест</button>
          <button class="secondary" id="reviewBtn" type="button">Просмотр теста</button>
        </div>
      </div>
      <div class="recent-files" id="recentFiles">
        <p class="recent-title">Последние файлы</p>
        <div class="recent-list" id="recentList"></div>
      </div>
      <textarea id="textInput" autocomplete="off" spellcheck="false" placeholder="? Вопрос
+ правильный ответ
- неправильный ответ
- неправильный ответ"></textarea>
      <div class="settings" aria-label="Настройки теста">
        <div class="field">
          <label for="rangeFrom">С вопроса</label>
          <input id="rangeFrom" type="number" min="1" step="1" value="1">
        </div>
        <div class="field">
          <label for="rangeTo">По вопрос</label>
          <input id="rangeTo" type="number" min="1" step="1" placeholder="до конца">
        </div>
        <div class="checks">
          <label class="check">
            <input id="shuffleQuestions" type="checkbox" checked>
            Перемешать вопросы
          </label>
          <label class="check">
            <input id="shuffleAnswers" type="checkbox" checked>
            Перемешать ответы
          </label>
        </div>
      </div>
      <div class="meta">
        <span class="badge" id="questionCount">Вопросов: 0</span>
        <span class="badge" id="selectedCount">Выбрано: 0</span>
        <span class="badge">Формат: ? вопрос, + верный, - неверный</span>
      </div>
      <div class="error" id="errorBox"></div>
    </section>

    <section class="panel quiz" id="quiz">
      <div class="progress">
        <span id="stepText">Вопрос 1 из 1</span>
        <span id="scoreText">Верно: 0</span>
      </div>
      <div class="bar" aria-hidden="true"><span id="barFill"></span></div>
      <h2 class="question" id="questionText"></h2>
      <ul class="answers" id="answers"></ul>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="secondary" id="backToSetup" type="button">Загрузить другой файл</button>
        <button id="nextBtn" type="button" disabled>Следующий вопрос</button>
      </div>
    </section>

    <section class="panel review" id="review">
      <div class="review-head">
        <div class="search-row">
          <label for="reviewSearch">Поиск по словам</label>
          <input id="reviewSearch" type="search" autocomplete="off" placeholder="Введите слово или фразу">
        </div>
        <button class="secondary" id="backFromReview" type="button">Назад</button>
      </div>
      <div class="meta">
        <span class="badge" id="reviewCount">Вопросов: 0</span>
        <span class="badge" id="searchCount">Найдено: 0</span>
      </div>
      <div class="review-list" id="reviewList"></div>
    </section>

    <section class="panel result" id="result">
      <h2>Тест завершен</h2>
      <div class="score" id="finalScore">0 / 0</div>
      <p id="finalText"></p>
      <button id="restartBtn" type="button">Пройти еще раз</button>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const chooseFileBtn = document.getElementById("chooseFileBtn");
    const openFileBtn = document.getElementById("openFileBtn");
    const textInput = document.getElementById("textInput");
    const startBtn = document.getElementById("startBtn");
    const reviewBtn = document.getElementById("reviewBtn");
    const loadSample = document.getElementById("loadSample");
    const themeToggle = document.getElementById("themeToggle");
    const questionCount = document.getElementById("questionCount");
    const selectedCount = document.getElementById("selectedCount");
    const rangeFrom = document.getElementById("rangeFrom");
    const rangeTo = document.getElementById("rangeTo");
    const shuffleQuestions = document.getElementById("shuffleQuestions");
    const shuffleAnswers = document.getElementById("shuffleAnswers");
    const errorBox = document.getElementById("errorBox");
    const setup = document.getElementById("setup");
    const quiz = document.getElementById("quiz");
    const review = document.getElementById("review");
    const result = document.getElementById("result");
    const stepText = document.getElementById("stepText");
    const scoreText = document.getElementById("scoreText");
    const barFill = document.getElementById("barFill");
    const questionText = document.getElementById("questionText");
    const answers = document.getElementById("answers");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const backToSetup = document.getElementById("backToSetup");
    const backFromReview = document.getElementById("backFromReview");
    const finalScore = document.getElementById("finalScore");
    const finalText = document.getElementById("finalText");
    const restartBtn = document.getElementById("restartBtn");
    const reviewSearch = document.getElementById("reviewSearch");
    const reviewList = document.getElementById("reviewList");
    const reviewCount = document.getElementById("reviewCount");
    const searchCount = document.getElementById("searchCount");
    const recentFiles = document.getElementById("recentFiles");
    const recentList = document.getElementById("recentList");

    let questions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let answered = false;
    let selectedAnswers = new Set();
    let reviewQuestions = [];
    let recentFileItems = [];

    const sampleText = `? Столица Франции
+ Париж
- Берлин
- Мадрид
- Рим

? Какой знак отмечает правильный ответ в этом формате
+ плюс
- вопросительный знак
- минус

? Сколько будет 2 + 2
+ 4
- 3
- 5`;

    function applyTheme(isDark) {
      document.body.classList.toggle("dark", isDark);
      themeToggle.checked = isDark;
      localStorage.setItem("txtTestTheme", isDark ? "dark" : "light");
    }

    function parseQuestions(text) {
      const parsed = [];
      let current = null;

      text.split(/\r?\n/).forEach((rawLine, index) => {
        const line = rawLine.trim();
        if (!line) return;

        const marker = line[0];
        const content = line.slice(1).trim();

        if (marker === "?") {
          if (current) parsed.push(current);
          current = { text: content || `Вопрос ${parsed.length + 1}`, answers: [], line: index + 1 };
          return;
        }

        if ((marker === "+" || marker === "-") && current) {
          if (content) current.answers.push({ text: content, correct: marker === "+" });
        }
      });

      if (current) parsed.push(current);

      return parsed;
    }

    function validateQuestions(items) {
      if (!items.length) return "Не нашел вопросов. Каждый вопрос должен начинаться с символа ?.";

      for (const [index, item] of items.entries()) {
        if (item.answers.length < 2) return `В вопросе ${index + 1} должно быть минимум два ответа.`;
        if (!item.answers.some((answer) => answer.correct)) return `В вопросе ${index + 1} нет правильного ответа со знаком +.`;
      }

      return "";
    }

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function setError(message) {
      errorBox.textContent = message;
      errorBox.style.display = message ? "block" : "none";
    }

    function getRecentCookie() {
      const item = document.cookie
        .split("; ")
        .find((row) => row.startsWith("txtTestRecentFiles="));

      if (!item) return [];

      try {
        return JSON.parse(decodeURIComponent(item.split("=").slice(1).join("=")));
      } catch {
        return [];
      }
    }

    function setRecentCookie(items) {
      const value = encodeURIComponent(JSON.stringify(items.slice(0, 6)));
      document.cookie = `txtTestRecentFiles=${value}; max-age=31536000; path=/; SameSite=Lax`;
    }

    function makeFileId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `file-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function openHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("txtTestFileHandles", 1);

        request.onupgradeneeded = () => {
          request.result.createObjectStore("handles");
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveFileHandle(id, handle) {
      const db = await openHandleDb();

      return new Promise((resolve, reject) => {
        const transaction = db.transaction("handles", "readwrite");
        transaction.objectStore("handles").put(handle, id);
        transaction.oncomplete = () => resolve();
        transaction.onerror = () => reject(transaction.error);
      });
    }

    async function getFileHandle(id) {
      const db = await openHandleDb();

      return new Promise((resolve, reject) => {
        const transaction = db.transaction("handles", "readonly");
        const request = transaction.objectStore("handles").get(id);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function rememberRecentFile(file, options = {}) {
      const existing = recentFileItems.find((item) => {
        return options.id ? item.id === options.id : item.name === file.name && item.size === file.size;
      });
      const item = {
        id: options.id || existing?.id || makeFileId(),
        name: file.name,
        size: file.size,
        lastModified: file.lastModified,
        hasHandle: Boolean(options.hasHandle || existing?.hasHandle),
        usedAt: Date.now()
      };

      recentFileItems = [
        item,
        ...recentFileItems.filter((recent) => recent.id !== item.id && recent.name !== item.name)
      ].slice(0, 6);
      setRecentCookie(recentFileItems);
      renderRecentFiles();

      return item;
    }

    async function loadFileText(file, options = {}) {
      textInput.value = await file.text();
      rememberRecentFile(file, options);
      refreshCount();
      setError("");
    }

    function renderRecentFiles() {
      recentList.innerHTML = "";
      recentFiles.classList.toggle("visible", recentFileItems.length > 0);

      recentFileItems.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "recent-file";
        button.title = item.hasHandle ? "Открыть этот файл" : "Файл нужно выбрать заново";

        const label = document.createElement("span");
        label.textContent = item.name;
        button.appendChild(label);

        button.addEventListener("click", () => loadRecentFile(item));
        recentList.appendChild(button);
      });
    }

    async function loadRecentFile(item) {
      if (!item.hasHandle) {
        setError("Этот файл был выбран обычной кнопкой браузера. Для автоподгрузки откройте его один раз через кнопку «Открыть TXT».");
        return;
      }

      try {
        const handle = await getFileHandle(item.id);
        if (!handle) {
          setError("Браузер больше не хранит доступ к этому файлу. Откройте его заново через «Открыть TXT».");
          return;
        }

        let permission = await handle.queryPermission({ mode: "read" });
        if (permission !== "granted") {
          permission = await handle.requestPermission({ mode: "read" });
        }
        if (permission !== "granted") {
          setError("Нет разрешения на чтение этого файла.");
          return;
        }

        const file = await handle.getFile();
        await loadFileText(file, { id: item.id, hasHandle: true });
      } catch {
        setError("Не получилось открыть последний файл. Выберите его заново.");
      }
    }

    async function openTxtFile() {
      if (!window.showOpenFilePicker) {
        fileInput.click();
        setError("Если браузер не поддерживает быстрые последние файлы, файл нужно выбирать обычной кнопкой.");
        return;
      }

      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "TXT-файлы",
            accept: { "text/plain": [".txt"] }
          }]
        });
        const file = await handle.getFile();
        const id = makeFileId();
        await saveFileHandle(id, handle);
        await loadFileText(file, { id, hasHandle: true });
      } catch (error) {
        if (error.name !== "AbortError") setError("Не получилось открыть файл.");
      }
    }

    function getRange(total) {
      const from = Math.max(1, Number.parseInt(rangeFrom.value, 10) || 1);
      const toValue = Number.parseInt(rangeTo.value, 10);
      const to = Number.isFinite(toValue) ? toValue : total;

      return {
        from,
        to: Math.min(total, Math.max(from, to))
      };
    }

    function getSelectedQuestions(items) {
      const range = getRange(items.length);
      return items.slice(range.from - 1, range.to);
    }

    function prepareSelectedQuestions() {
      const parsed = parseQuestions(textInput.value);
      const error = validateQuestions(parsed);

      if (error) {
        setError(error);
        return null;
      }

      const selected = getSelectedQuestions(parsed);
      if (!selected.length) {
        setError("В выбранном диапазоне нет вопросов.");
        return null;
      }

      return selected;
    }

    function syncRangeControls(total) {
      rangeFrom.max = String(Math.max(total, 1));
      rangeTo.max = String(Math.max(total, 1));
      rangeTo.placeholder = total ? `до ${total}` : "до конца";

      if (Number(rangeFrom.value) < 1) rangeFrom.value = "1";
      if (total && Number(rangeFrom.value) > total) rangeFrom.value = String(total);
      if (rangeTo.value && Number(rangeTo.value) > total) rangeTo.value = String(total);
    }

    function refreshCount() {
      const parsed = parseQuestions(textInput.value);
      syncRangeControls(parsed.length);
      questionCount.textContent = `Вопросов: ${parsed.length}`;
      selectedCount.textContent = `Выбрано: ${getSelectedQuestions(parsed).length}`;
      setError("");
    }

    function startQuiz() {
      const selected = prepareSelectedQuestions();
      if (!selected) return;

      questions = selected.map((question) => ({
        ...question,
        answers: shuffleAnswers.checked ? shuffle(question.answers) : [...question.answers]
      }));

      if (shuffleQuestions.checked) {
        questions = shuffle(questions);
      }

      currentIndex = 0;
      correctCount = 0;
      setup.style.display = "none";
      result.style.display = "none";
      quiz.style.display = "block";
      renderQuestion();
    }

    function showReview() {
      const selected = prepareSelectedQuestions();
      if (!selected) return;

      reviewQuestions = selected;
      reviewSearch.value = "";
      setup.style.display = "none";
      quiz.style.display = "none";
      result.style.display = "none";
      review.style.display = "block";
      renderReview();
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightText(value, query) {
      if (!query) return escapeHtml(value);

      return value
        .split(new RegExp(`(${escapeRegExp(query)})`, "gi"))
        .map((part) => part.toLowerCase() === query.toLowerCase() ? `<mark>${escapeHtml(part)}</mark>` : escapeHtml(part))
        .join("");
    }

    function renderReview() {
      const query = reviewSearch.value.trim();
      const queryLower = query.toLowerCase();
      let visibleCount = 0;

      reviewList.innerHTML = "";

      reviewQuestions.forEach((question, index) => {
        const haystack = [
          question.text,
          ...question.answers.map((answer) => answer.text)
        ].join(" ").toLowerCase();

        if (queryLower && !haystack.includes(queryLower)) return;
        visibleCount += 1;

        const article = document.createElement("article");
        article.className = "review-question";

        const title = document.createElement("p");
        title.className = "review-title";
        title.innerHTML = `${index + 1}. ${highlightText(question.text, query)}`;

        const list = document.createElement("ul");
        list.className = "review-answers";

        question.answers.forEach((answer) => {
          const item = document.createElement("li");
          item.className = `review-answer${answer.correct ? " correct" : ""}`;
          item.innerHTML = `${answer.correct ? "+ " : "- "}${highlightText(answer.text, query)}`;
          list.appendChild(item);
        });

        article.appendChild(title);
        article.appendChild(list);
        reviewList.appendChild(article);
      });

      reviewCount.textContent = `Вопросов: ${reviewQuestions.length}`;
      searchCount.textContent = query ? `Найдено: ${visibleCount}` : `Найдено: ${reviewQuestions.length}`;
    }

    function renderQuestion() {
      const question = questions[currentIndex];
      answered = false;
      selectedAnswers = new Set();
      nextBtn.disabled = true;
      nextBtn.textContent = "Проверить";
      feedback.textContent = "";
      feedback.className = "feedback";
      answers.innerHTML = "";

      stepText.textContent = `Вопрос ${currentIndex + 1} из ${questions.length}`;
      scoreText.textContent = `Верно: ${correctCount}`;
      barFill.style.width = `${(currentIndex / questions.length) * 100}%`;
      questionText.textContent = question.text;

      question.answers.forEach((answer, index) => {
        const item = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "answer";
        button.dataset.index = String(index);
        button.innerHTML = `<span class="mark">${index + 1}</span><span></span>`;
        button.querySelector("span:last-child").textContent = answer.text;
        button.addEventListener("click", () => toggleAnswer(button, index));
        item.appendChild(button);
        answers.appendChild(item);
      });
    }

    function toggleAnswer(button, index) {
      if (answered) return;

      if (selectedAnswers.has(index)) {
        selectedAnswers.delete(index);
        button.classList.remove("selected");
      } else {
        selectedAnswers.add(index);
        button.classList.add("selected");
      }

      nextBtn.disabled = selectedAnswers.size === 0;
    }

    function checkAnswers() {
      if (answered || selectedAnswers.size === 0) return;
      answered = true;

      document.querySelectorAll(".answer").forEach((answerButton) => {
        answerButton.disabled = true;
      });

      const question = questions[currentIndex];
      const isCorrect = question.answers.every((answer, index) => {
        return answer.correct === selectedAnswers.has(index);
      });

      if (isCorrect) {
        correctCount += 1;
        feedback.textContent = "Верно";
        feedback.classList.add("good");
      } else {
        feedback.textContent = "Неверно";
        feedback.classList.add("bad");
      }

      highlightCheckedAnswers();
      scoreText.textContent = `Верно: ${correctCount}`;
      nextBtn.disabled = false;
      nextBtn.textContent = currentIndex === questions.length - 1 ? "Показать результат" : "Следующий вопрос";
      barFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
    }

    function highlightCheckedAnswers() {
      const question = questions[currentIndex];
      document.querySelectorAll(".answer").forEach((button, index) => {
        button.classList.remove("selected");
        if (question.answers[index].correct) {
          button.classList.add("correct");
        } else if (selectedAnswers.has(index)) {
          button.classList.add("wrong");
        }
      });
    }

    function nextQuestion() {
      if (!answered) {
        checkAnswers();
        return;
      }

      currentIndex += 1;

      if (currentIndex >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }
    function showResult() {
      quiz.style.display = "none";
      result.style.display = "block";
      const percent = Math.round((correctCount / questions.length) * 100);
      finalScore.textContent = `${correctCount} / ${questions.length}`;
      finalText.textContent = `Результат: ${percent}%`;
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        textInput.value = reader.result;
        rememberRecentFile(file, { hasHandle: false });
        refreshCount();
      };
      reader.onerror = () => setError("Не получилось прочитать файл.");
      reader.readAsText(file, "UTF-8");
    });

    chooseFileBtn.addEventListener("click", () => fileInput.click());
    openFileBtn.addEventListener("click", openTxtFile);
    textInput.addEventListener("input", refreshCount);
    rangeFrom.addEventListener("input", refreshCount);
    rangeTo.addEventListener("input", refreshCount);
    themeToggle.addEventListener("change", () => applyTheme(themeToggle.checked));
    startBtn.addEventListener("click", startQuiz);
    reviewBtn.addEventListener("click", showReview);
    nextBtn.addEventListener("click", nextQuestion);
    reviewSearch.addEventListener("input", renderReview);
    loadSample.addEventListener("click", () => {
      textInput.value = sampleText;
      refreshCount();
    });
    backToSetup.addEventListener("click", () => {
      quiz.style.display = "none";
      setup.style.display = "grid";
    });
    backFromReview.addEventListener("click", () => {
      review.style.display = "none";
      setup.style.display = "grid";
    });
    restartBtn.addEventListener("click", () => {
      result.style.display = "none";
      setup.style.display = "grid";
    });

    recentFileItems = getRecentCookie();
    renderRecentFiles();
    applyTheme(localStorage.getItem("txtTestTheme") === "dark");
    refreshCount();
  </script>
</body>
</html>
