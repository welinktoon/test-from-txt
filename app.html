ilter(r=>r!==null).length,p=questions.length?Math.round(done/questions.length*100):0;statusFill.style.width=`${p}%`;statusBar.title=`Пройдено ${done} из ${questions.length}`}function updateScoreText(){scoreText.textContent=`Верно: ${correctCount}`;wrongText.textContent=`Неверно: ${answerResults.filter(r=>r===false).length}`}function setSampleButtonVisible(v){loadSample.hidden=!v}function startQuiz(){const selected=prepareSelectedQuestions();if(!selected)return;saveSettings();const quizQuestions=applyRandomQuestionSelection(selected);questions=quizQuestions.map(q=>({...q,answers:shuffleAnswers.checked?shuffle(q.answers):[...q.answers]}));if(shuffleQuestions.checked)questions=shuffle(questions);currentIndex=0;correctCount=0;answerResults=Array(questions.length).fill(null);selectedAnswerHistory=Array(questions.length).fill(null);setup.style.display="none";result.style.display="none";review.style.display="none";quiz.style.display="grid";setSampleButtonVisible(false);startTimer();renderQuestion()}function showReview(){const selected=prepareSelectedQuestions({useFavoriteFilter:false});if(!selected)return;reviewQuestions=selected;reviewSearch.value="";showOnlyFavorites=false;setup.style.display="none";quiz.style.display="none";result.style.display="none";review.style.display="grid";setSampleButtonVisible(false);renderReview()}function esc(v){return v.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}function escReg(v){return v.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}function hi(v,q){if(!q)return esc(v);return v.split(new RegExp(`(${escReg(q)})`,"gi")).map(p=>p.toLowerCase()===q.toLowerCase()?`<mark>${esc(p)}</mark>`:esc(p)).join("")}function renderReview(){const query=reviewSearch.value.trim(),lower=query.toLowerCase();let visible=0;const list=showOnlyFavorites?reviewQuestions.filter(isFavorite):reviewQuestions;reviewList.innerHTML="";showFavoritesBtn.textContent=showOnlyFavorites?"Показать все":"Показать избранные";list.forEach(q=>{const hay=[q.text,...q.answers.map(a=>a.text)].join(" ").toLowerCase();if(lower&&!hay.includes(lower))return;visible++;const article=document.createElement("article");article.className="review-question";const row=document.createElement("div");row.className="review-title-row";const title=document.createElement("p");title.className="review-title";title.innerHTML=`${reviewQuestions.indexOf(q)+1}. ${hi(q.text,query)}`;const fav=document.createElement("button");fav.type="button";fav.className="favorite-btn";setFavBtn(fav,q);fav.addEventListener("click",()=>toggleFavorite(q));const ul=document.createElement("ul");ul.className="review-answers";q.answers.forEach(a=>{const li=document.createElement("li");li.className=`review-answer${a.correct?" correct":""}`;li.innerHTML=`${a.correct?"+ ":"- "}${hi(a.text,query)}`;ul.appendChild(li)});row.append(title,fav);article.append(row,ul);reviewList.appendChild(article)});if(!visible){const empty=document.createElement("div");empty.className="empty-state";empty.textContent=showOnlyFavorites&&!list.length?"В избранном пока нет вопросов.":"Поиск ничего не нашел.";reviewList.appendChild(empty)}reviewCount.textContent=showOnlyFavorites?`Избранных: ${list.length}`:`Вопросов: ${reviewQuestions.length}`;searchCount.textContent=query?`Найдено: ${visible}`:`Найдено: ${list.length}`}function renderQuestion(){const q=questions[currentIndex],saved=answerResults[currentIndex];answered=saved!==null;selectedAnswers=new Set(selectedAnswerHistory[currentIndex]||[]);prevBtn.disabled=currentIndex===0;nextBtn.disabled=!answered&&selectedAnswers.size===0;nextBtn.textContent=answered?(currentIndex===questions.length-1?"Показать результат":"Следующий вопрос"):"Проверить";feedback.textContent="";feedback.className="feedback";answers.innerHTML="";stepText.textContent=`Вопрос ${currentIndex+1} из ${questions.length}`;updateScoreText();renderStatusBar();questionText.textContent=q.text;setFavBtn(quizFavoriteBtn,q);q.answers.forEach((a,i)=>{const li=document.createElement("li"),b=document.createElement("button");b.type="button";b.className="answer";b.dataset.index=i;b.innerHTML=`<span class="mark">${i+1}</span><span></span>`;b.querySelector("span:last-child").textContent=a.text;if(selectedAnswers.has(i))b.classList.add("selected");if(answered)b.disabled=true;b.addEventListener("click",()=>toggleAnswer(b,i));li.appendChild(b);answers.appendChild(li)});if(answered){feedback.textContent=saved?"Верно":"Неверно";feedback.classList.add(saved?"good":"bad");highlightCheckedAnswers()}}function toggleAnswer(btn,i){if(answered)return;selectedAnswers.has(i)?(selectedAnswers.delete(i),btn.classList.remove("selected")):(selectedAnswers.add(i),btn.classList.add("selected"));selectedAnswerHistory[currentIndex]=[...selectedAnswers];nextBtn.disabled=selectedAnswers.size===0}function checkAnswers(){if(answered||!selectedAnswers.size)return;answered=true;document.querySelectorAll(".answer").forEach(b=>b.disabled=true);const q=questions[currentIndex],ok=q.answers.every((a,i)=>a.correct===selectedAnswers.has(i));if(ok){correctCount++;feedback.textContent="Верно";feedback.classList.add("good")}else{feedback.textContent="Неверно";feedback.classList.add("bad")}answerResults[currentIndex]=ok;selectedAnswerHistory[currentIndex]=[...selectedAnswers];highlightCheckedAnswers();updateScoreText();nextBtn.disabled=false;nextBtn.textContent=currentIndex===questions.length-1?"Показать результат":"Следующий вопрос";renderStatusBar()}function highlightCheckedAnswers(){const q=questions[currentIndex];document.querySelectorAll(".answer").forEach((b,i)=>{b.classList.remove("selected","correct","wrong","chosen");if(selectedAnswers.has(i))b.classList.add("chosen");if(q.answers[i].correct)b.classList.add("correct");else if(selectedAnswers.has(i))b.classList.add("wrong")})}function nextQuestion(){if(!answered){checkAnswers();return}currentIndex++;currentIndex>=questions.length?showResult():renderQuestion()}function previousQuestion(){if(currentIndex===0)return;current urn item}async function loadFileText(file,opt={}){textInput.value=await file.text();rememberRecentFile(file,opt);refreshCount();setError("")}function renderRecentFiles(){recentList.innerHTML="";recentFiles.classList.toggle("visible",recentFileItems.length>0);clearRecentBtn.hidden=!recentFileItems.length;recentFileItems.forEach(item=>{const b=document.createElement("button");b.type="button";b.className="recent-file";b.title=item.hasHandle?"Открыть этот файл":"Файл нужно выбрать заново";const s=document.createElement("span");s.textContent=item.name;b.appendChild(s);b.addEventListener("click",()=>loadRecentFile(item));recentList.appendChild(b)})}function clearHandleDb(){return new Promise((res,rej)=>{const r=indexedDB.deleteDatabase("txtTestFileHandles");r.onsuccess=()=>res();r.onerror=()=>rej(r.error);r.onblocked=()=>res()})}async function clearRecentFiles(){if(!recentFileItems.length)return;if(!confirm("Удалить список последних файлов?"))return;recentFileItems=[];setRecentCookie([]);try{await clearHandleDb()}catch{}renderRecentFiles();setError("Список последних файлов очищен.")}async function loadRecentFile(item){if(!item.hasHandle){setError("Этот файл был выбран обычной кнопкой браузера. Для автоподгрузки откройте его один раз через кнопку «Открыть TXT».");return}try{const h=await getFileHandle(item.id);if(!h){setError("Браузер больше не хранит доступ к этому файлу. Откройте его заново через «Открыть TXT».");return}let p=await h.queryPermission({mode:"read"});if(p!=="granted")p=await h.requestPermission({mode:"read"});if(p!=="granted"){setError("Нет разрешения на чтение этого файла.");return}await loadFileText(await h.getFile(),{id:item.id,hasHandle:true})}catch{setError("Не получилось открыть последний файл. Выберите его заново.")}}async function openTxtFile(){if(!window.showOpenFilePicker){fileInput.click();setError("Если браузер не поддерживает быстрые последние файлы, файл нужно выбирать обычной кнопкой.");return}try{const[h]=await showOpenFilePicker({multiple:f
